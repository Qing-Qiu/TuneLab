name: Refresh profile stats

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Request profile README refresh
        env:
          PROFILE_REPO: Qing-Qiu/Qing-Qiu
          PROFILE_REFRESH_TOKEN: ${{ secrets.PROFILE_REFRESH_TOKEN }}
        run: |
          if [ -z "$PROFILE_REFRESH_TOKEN" ]; then
            echo "PROFILE_REFRESH_TOKEN is not configured; skipping profile refresh."
            exit 0
          fi

          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PROFILE_REFRESH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$PROFILE_REPO/dispatches" \
            -d "{\"event_type\":\"project-lines-update\",\"client_payload\":{\"source_repo\":\"$GITHUB_REPOSITORY\",\"source_sha\":\"$GITHUB_SHA\"}}"
